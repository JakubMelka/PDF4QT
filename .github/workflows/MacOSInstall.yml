name: MacOS_Install

on:
  workflow_dispatch:

jobs:
  build_macos:
    runs-on: macos-15-intel
    env:
      VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/pdf4qt/vcpkg/overlays/general
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: pdf4qt

      - name: Prepare vcpkg directories
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: 'VCPKG: Set up VCPKG'
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.sh -disableMetrics
          ./vcpkg integrate install

      - name: 'VCPKG: Cache vcpkg dependencies'
        uses: actions/cache@v4
        with:
          path: |
            ./vcpkg/downloads
            ./vcpkg/packages
            ./vcpkg_installed
          key: ${{ runner.os }}-vcpkg-v2-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-v2-

      - name: 'VCPKG: Install project dependencies'
        run: |
          ./vcpkg install --triplet x64-osx --x-manifest-root=$GITHUB_WORKSPACE/pdf4qt --x-install-root=$VCPKG_INSTALLED_DIR --clean-buildtrees-after-build --clean-packages-after-build
        working-directory: vcpkg

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          dir: '${{ github.workspace }}/qt/'
          modules: 'qtspeech qtmultimedia'
          cache: 'true'
          cache-key-prefix: ${{ runner.os }}-qt-690

      - name: Build project
        working-directory: pdf4qt
        run: |
          cmake -B build -S . -DPDF4QT_INSTALL_QT_DEPENDENCIES=OFF -DPDF4QT_INSTALL_DEPENDENCIES=OFF -DPDF4QT_INSTALL_TO_USR=OFF -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_VCPKG_BUILD_TYPE=Release -DPDF4QT_QT_ROOT="$QT_ROOT_DIR"
          cmake --build build --target all release_translations -j6

      - name: Read version
        id: get_version
        run: |
          version=$(cat "pdf4qt/build/version.txt")
          echo "Version: $version"
          echo "pdf4qt_version=$version" >> $GITHUB_ENV
          echo "dmgfilename=PDF4QT-macOS-$version.dmg" >> $GITHUB_ENV

      - name: Prepare DMG contents
        run: |
          DIST_ROOT="$GITHUB_WORKSPACE/pdf4qt/build/dist"
          APPS_DIR="$DIST_ROOT/PDF4QT"
          mkdir -p "$APPS_DIR"

          app_count=$(find "$GITHUB_WORKSPACE/pdf4qt/build/bin" -maxdepth 1 -type d -name "*.app" | wc -l | tr -d ' ')
          if [ "$app_count" -eq 0 ]; then
            echo "No .app bundles found in $GITHUB_WORKSPACE/pdf4qt/build/bin"
            exit 1
          fi

          find "$GITHUB_WORKSPACE/pdf4qt/build/bin" -maxdepth 1 -type d -name "*.app" -print0 | while IFS= read -r -d '' app; do
            app_name="$(basename "$app")"
            ditto "$app" "$APPS_DIR/$app_name"
            plugin_args=()
            if [ -d "$GITHUB_WORKSPACE/pdf4qt/build/bin/pdfplugins" ]; then
              mkdir -p "$APPS_DIR/$app_name/Contents/MacOS/pdfplugins"
              while IFS= read -r -d '' plugin; do
                plugin_name="$(basename "$plugin")"
                target_plugin="$APPS_DIR/$app_name/Contents/MacOS/pdfplugins/$plugin_name"
                ditto "$plugin" "$target_plugin"
                plugin_args+=("-executable=$target_plugin")
              done < <(find "$GITHUB_WORKSPACE/pdf4qt/build/bin/pdfplugins" -maxdepth 1 -type f -name "*.dylib" -print0)
            fi

            macdeployqt "$APPS_DIR/$app_name" -always-overwrite -verbose=2 "${plugin_args[@]}"
            if [ -d "$GITHUB_WORKSPACE/pdf4qt/build/bin/translations" ]; then
              ditto "$GITHUB_WORKSPACE/pdf4qt/build/bin/translations" "$APPS_DIR/$app_name/Contents/MacOS/translations"
            fi
          done

          ln -s /Applications "$DIST_ROOT/Applications"

      - name: Create DMG package
        run: |
          hdiutil create -volname "PDF4QT ${{ env.pdf4qt_version }}" -srcfolder "$GITHUB_WORKSPACE/pdf4qt/build/dist" -ov -format UDZO "$GITHUB_WORKSPACE/pdf4qt/build/${{ env.dmgfilename }}"

      - name: Upload DMG package
        uses: actions/upload-artifact@v4
        with:
          name: '${{ env.dmgfilename }}'
          path: ./pdf4qt/build/${{ env.dmgfilename }}
          retention-days: 30
          compression-level: 0
